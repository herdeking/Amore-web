<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#FF4B6E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Amore">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>Amore Dating</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a2e; max-width: 480px; margin: 0 auto; min-height: 100vh; }
    :root { --primary: #FF4B6E; --secondary: #FF8C6B; --text: #1a1a2e; --light: #f8f8f8; --border: #ebebeb; }

    /* Pages */
    .page { display: none; min-height: 100vh; flex-direction: column; }
    .page.active { display: flex; }

    /* Auth */
    .auth-container { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 32px 24px; }
    .auth-logo { font-size: 48px; text-align: center; margin-bottom: 8px; }
    .auth-title { font-size: 28px; font-weight: 800; text-align: center; color: var(--primary); margin-bottom: 4px; }
    .auth-sub { font-size: 14px; color: #888; text-align: center; margin-bottom: 32px; }
    .input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 16px; outline: none; margin-bottom: 12px; }
    .input:focus { border-color: var(--primary); }
    .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    .btn:active { opacity: 0.8; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-outline { background: transparent; color: var(--primary); border: 1.5px solid var(--primary); margin-top: 8px; }
    .auth-switch { text-align: center; margin-top: 16px; font-size: 14px; color: #888; }
    .auth-switch span { color: var(--primary); cursor: pointer; font-weight: 600; }

    /* Bottom Nav */
    .bottom-nav { display: flex; position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #fff; border-top: 1px solid var(--border); padding: 8px 0 20px; z-index: 100; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; padding: 4px; }
    .nav-icon { font-size: 22px; }
    .nav-label { font-size: 10px; color: #888; }
    .nav-item.active .nav-label { color: var(--primary); }
    .nav-item.active .nav-icon { filter: none; }

    /* Header */
    .header { display: flex; align-items: center; padding: 16px; border-bottom: 1px solid var(--border); background: #fff; position: sticky; top: 0; z-index: 50; }
    .header-title { flex: 1; font-size: 20px; font-weight: 800; color: var(--primary); }

    /* Content */
    .content { flex: 1; overflow-y: auto; padding-bottom: 80px; }

    /* Cards */
    .card { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin: 16px; }
    .card-img { width: 100%; height: 400px; object-fit: cover; }
    .card-info { padding: 16px; }
    .card-name { font-size: 22px; font-weight: 700; }
    .card-location { font-size: 13px; color: #888; margin-top: 4px; }
    .card-bio { font-size: 14px; color: #555; margin-top: 8px; }

    /* Action buttons */
    .action-btns { display: flex; justify-content: center; gap: 20px; padding: 16px; }
    .action-btn { width: 60px; height: 60px; border-radius: 30px; border: none; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .btn-pass { background: #fff; }
    .btn-like { background: var(--primary); }
    .btn-super { background: #4FC3F7; }

    /* Messages */
    .chat-list { padding: 0; }
    .chat-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
    .chat-item:active { background: var(--light); }
    .avatar { width: 50px; height: 50px; border-radius: 25px; object-fit: cover; background: var(--light); }
    .chat-info { flex: 1; }
    .chat-name { font-size: 15px; font-weight: 600; }
    .chat-last { font-size: 13px; color: #888; margin-top: 2px; }
    .chat-time { font-size: 11px; color: #888; }

    /* Profile */
    .profile-header { position: relative; }
    .profile-cover { width: 100%; height: 250px; object-fit: cover; }
    .profile-avatar { width: 90px; height: 90px; border-radius: 45px; border: 3px solid #fff; position: absolute; bottom: -45px; left: 50%; transform: translateX(-50%); object-fit: cover; }
    .profile-body { padding: 60px 20px 20px; text-align: center; }
    .profile-name { font-size: 24px; font-weight: 800; }
    .profile-location { font-size: 14px; color: #888; margin-top: 4px; }

    /* Loading */
    .loading { display: flex; align-items: center; justify-content: center; min-height: 200px; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }

    /* Install banner */
    .install-banner { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
    .install-banner button { background: #fff; color: var(--primary); border: none; padding: 6px 14px; border-radius: 20px; font-weight: 700; cursor: pointer; font-size: 13px; }
  </style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- LOADING PAGE -->
<div class="page active" id="loadingPage" style="align-items:center;justify-content:center;background:linear-gradient(135deg,#FF4B6E,#FF8C6B)">
  <div style="text-align:center;color:#fff">
    <div style="font-size:72px">💕</div>
    <div style="font-size:32px;font-weight:800;margin-top:8px">Amore</div>
    <div style="margin-top:24px"><div class="spinner" style="border-color:rgba(255,255,255,0.3);border-top-color:#fff;margin:0 auto"></div></div>
  </div>
</div>

<!-- LOGIN PAGE -->
<div class="page active" id="loginPage">
  <div class="auth-container">
    <div class="auth-logo">💕</div>
    <div class="auth-title">Amore</div>
    <div class="auth-sub">Find your perfect match</div>
    <input class="input" type="email" id="loginEmail" placeholder="Email address">
    <input class="input" type="password" id="loginPassword" placeholder="Password">
    <button class="btn btn-primary" onclick="login()">Sign In</button>
    <button class="btn btn-outline" onclick="showPage('signupPage')">Create Account</button>
    <div class="auth-switch">Forgot password? <span onclick="resetPassword()">Reset</span></div>
  </div>
</div>

<!-- SIGNUP PAGE -->
<div class="page" id="signupPage">
  <div class="auth-container">
    <div class="auth-logo">💕</div>
    <div class="auth-title">Join Amore</div>
    <div class="auth-sub">Create your account</div>
    <input class="input" type="text" id="signupName" placeholder="Full name">
    <input class="input" type="email" id="signupEmail" placeholder="Email address">
    <input class="input" type="password" id="signupPassword" placeholder="Password (min 6 chars)">
    <button class="btn btn-primary" onclick="signup()">Create Account</button>
    <button class="btn btn-outline" onclick="showPage('loginPage')">Already have account? Sign In</button>
  </div>
</div>

<!-- MAIN APP -->
<div class="page" id="appPage">
  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('discoverTab', this)">
      <span class="nav-icon">🔍</span>
      <span class="nav-label">Discover</span>
    </div>
    <div class="nav-item" onclick="switchTab('likesTab', this)">
      <span class="nav-icon">❤️</span>
      <span class="nav-label">Likes</span>
    </div>
    <div class="nav-item" onclick="switchTab('messagesTab', this)">
      <span class="nav-icon">💬</span>
      <span class="nav-label">Messages</span>
    </div>
    <div class="nav-item" onclick="switchTab('profileTab', this)">
      <span class="nav-icon">👤</span>
      <span class="nav-label">Profile</span>
    </div>
  </nav>

  <!-- DISCOVER TAB -->
  <div id="discoverTab" class="content">
    <div class="header">
      <span class="header-title">Amore 💕</span>
      <span style="font-size:20px;cursor:pointer" onclick="switchTab('searchTab',null)">🔍</span>
    </div>
    <div id="swipeCards">
      <div class="loading"><div class="spinner"></div></div>
    </div>
    <div class="action-btns">
      <button class="action-btn btn-pass" onclick="swipePass()">❌</button>
      <button class="action-btn btn-super" onclick="swipeSuperLike()">⭐</button>
      <button class="action-btn btn-like" onclick="swipeLike()">❤️</button>
    </div>
  </div>

  <!-- LIKES TAB -->
  <div id="likesTab" class="content" style="display:none">
    <div class="header"><span class="header-title">Likes ❤️</span></div>
    <div id="likesList"><div class="loading"><div class="spinner"></div></div></div>
  </div>

  <!-- MESSAGES TAB -->
  <div id="messagesTab" class="content" style="display:none">
    <div class="header">
      <span class="header-title">Messages 💕</span>
      <span style="font-size:20px;cursor:pointer" onclick="switchTab('searchTab',null)">🔍</span>
    </div>
    <div id="messagesList"><div class="loading"><div class="spinner"></div></div></div>
  </div>

  <!-- PROFILE TAB -->
  <div id="profileTab" class="content" style="display:none">
    <div id="profileContent"><div class="loading"><div class="spinner"></div></div></div>
  </div>

  <!-- SEARCH TAB -->
  <div id="searchTab" class="content" style="display:none">
    <div class="header">
      <span onclick="switchTab('discoverTab',null)" style="font-size:24px;cursor:pointer;margin-right:12px">‹</span>
      <input style="flex:1;border:1.5px solid #eee;border-radius:20px;padding:8px 16px;font-size:15px;outline:none" placeholder="Search by name..." id="searchInput" oninput="searchUsers()">
    </div>
    <div id="searchResults"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut, browserLocalPersistence, setPersistence } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, collection, query, where, getDocs, doc, getDoc, setDoc, addDoc, updateDoc, orderBy, limit, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDMEzHwG5NCx-4Sr-rCnFAGrFlWLrLsmOc",
  authDomain: "amore-dating-9b956.firebaseapp.com",
  projectId: "amore-dating-9b956",
  storageBucket: "amore-dating-9b956.firebasestorage.app",
  messagingSenderId: "525255599408",
  appId: "1:525255599408:web:504a867157ddb2879454f5",
  databaseURL: "https://amore-dating-9b956-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
setPersistence(auth, browserLocalPersistence).catch(() => {});
const db = getFirestore(app);

let currentUser = null;
let currentProfile = null;
let profiles = [];
let profileIndex = 0;

window.showPage = (pageId) => {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
};

window.switchTab = (tabId, navEl) => {
  document.querySelectorAll('.content').forEach(t => t.style.display = 'none');
  document.getElementById(tabId).style.display = 'flex';
  document.getElementById(tabId).style.flexDirection = 'column';
  if (navEl) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    navEl.classList.add('active');
  }
  if (tabId === 'messagesTab') loadMessages();
  if (tabId === 'likesTab') loadLikes();
  if (tabId === 'profileTab') loadProfile();
  if (tabId === 'discoverTab') loadProfiles();
};

window.toast = (msg) => {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
};

window.login = async () => {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) return toast('Please fill all fields');
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch(e) { toast(e.message); }
};

window.signup = async () => {
  const name = document.getElementById('signupName').value;
  const email = document.getElementById('signupEmail').value;
  const password = document.getElementById('signupPassword').value;
  if (!name || !email || !password) return toast('Please fill all fields');
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await setDoc(doc(db, 'users', cred.user.uid), {
      id: cred.user.uid,
      name, email,
      createdAt: new Date().toISOString(),
      onboardingComplete: false,
      photos: [],
    });
  } catch(e) { toast(e.message); }
};

window.resetPassword = async () => {
  const email = document.getElementById('loginEmail').value;
  if (!email) return toast('Enter your email first');
  try {
    await sendPasswordResetEmail(auth, email);
    toast('Reset email sent!');
  } catch(e) { toast(e.message); }
};

window.logout = async () => {
  await signOut(auth);
};

onAuthStateChanged(auth, async (user) => {
  if (user) {
    showPage('loadingPage');
    try {
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (snap.exists()) {
        currentUser = { id: user.uid, ...snap.data() };
      } else {
        currentUser = { id: user.uid, name: user.displayName ?? user.email?.split('@')[0] ?? 'User', email: user.email, photos: [] };
      }
    } catch(e) {
      currentUser = { id: user.uid, name: user.email?.split('@')[0] ?? 'User', email: user.email, photos: [] };
    }
    showPage('appPage');
    switchTab('discoverTab', document.querySelector('.nav-item'));
    loadProfiles();
  } else {
    currentUser = null;
    showPage('loginPage');
  }
});

async function loadProfiles() {
  const el = document.getElementById('swipeCards');
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const snap = await getDocs(collection(db, 'users'));
    profiles = snap.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .filter(u => u.id !== currentUser?.id && (u.photos?.length > 0 || u.photoURL));
    // Shuffle profiles
    profiles = profiles.sort(() => Math.random() - 0.5);
    profileIndex = 0;
    showCard();
  } catch(e) { el.innerHTML = '<p style="text-align:center;padding:40px;color:#888">No profiles found</p>'; }
}

function showCard() {
  const el = document.getElementById('swipeCards');
  if (profileIndex >= profiles.length) {
    el.innerHTML = '<div style="text-align:center;padding:60px 20px"><div style="font-size:48px">💫</div><p style="font-size:18px;font-weight:700;margin-top:16px">No more profiles!</p><p style="color:#888;margin-top:8px">Check back later</p><button class="btn btn-primary" style="width:auto;padding:12px 24px;margin-top:16px" onclick="loadProfiles()">Refresh</button></div>';
    return;
  }
  currentProfile = profiles[profileIndex];
  const p = currentProfile;
  el.innerHTML = `
    <div class="card" style="cursor:pointer" id="currentCard">`;
  document.getElementById('currentCard').addEventListener('click', () => viewProfile(p.id));
  document.getElementById('currentCard').innerHTML += `
      <div style="position:relative">
        <img class="card-img" src="${p.photos?.[0] ?? 'https://placehold.co/400x500/FF4B6E/white?text=No+Photo'}" onerror="this.src='https://placehold.co/400x500/FF4B6E/white?text=No+Photo'" style="width:100%;height:450px;object-fit:cover">
        <div style="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.7));padding:20px;color:#fff">
          <div style="font-size:24px;font-weight:800">${p.name ?? 'Unknown'}${p.age ? ', ' + p.age : ''}</div>
          <div style="font-size:13px;opacity:0.9;margin-top:4px">📍 ${p.location ?? 'Unknown location'}</div>
          ${p.bio ? `<div style="font-size:13px;opacity:0.8;margin-top:6px">${p.bio.substring(0,80)}${p.bio.length>80?'...':''}</div>` : ''}
        </div>
      </div>
    </div>`;
}

// Add click to card after render
const addCardClick = () => {
  const card = document.getElementById('swipeCard');
  if (card) card.onclick = () => viewProfile(card.dataset.uid);
};

window.viewProfile = (userId) => {
  const p = profiles.find(u => u.id === userId);
  if (!p) return;
  const photos = p.photos ?? [];
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:#fff;z-index:999;overflow-y:auto;max-width:480px;margin:0 auto';
  modal.innerHTML = `
    <div style="position:sticky;top:0;background:#fff;padding:16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #eee;z-index:1">
      <span onclick="this.closest('div[style*=fixed]').remove()" style="font-size:28px;cursor:pointer">‹</span>
      <span style="font-size:18px;font-weight:700">${p.name ?? 'Profile'}</span>
    </div>
    <img src="${photos[0] ?? 'https://placehold.co/480x400'}" style="width:100%;height:400px;object-fit:cover">
    <div style="padding:20px">
      <div style="font-size:24px;font-weight:800">${p.name ?? 'Unknown'}${p.age ? ', ' + p.age : ''}</div>
      <div style="color:#888;margin-top:4px">📍 ${p.location ?? ''}</div>
      ${p.bio ? `<p style="margin-top:12px;color:#555">${p.bio}</p>` : ''}
      ${p.interests?.length ? `<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px">${p.interests.map(function(i){return `<span style="background:#fff0f3;color:#FF4B6E;padding:4px 12px;border-radius:20px;font-size:13px">${i}</span>`;}).join('')}</div>` : ''}
      <div style="margin-top:16px;background:#f8f8f8;border-radius:16px;padding:16px">
        <div style="font-weight:700;margin-bottom:12px">About</div>
        ${[['Gender',p.gender],['Purpose',p.purpose],['Height',p.height?p.height+' cm':null],['Weight',p.weight?p.weight+' kg':null],['Education',p.education],['Smoking',p.smoking],['Alcohol',p.alcohol],['Children',p.children],['Physique',p.physique],['Dwelling',p.dwelling],['Car',p.car],['Sociability',p.sociability],['Looking for',p.lookingFor]].filter(function(f){return f[1];}).map(function(f){return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee"><span style="color:#888">${f[0]}</span><span style="font-weight:600">${f[1]}</span></div>`;}).join('')}
      </div>
      ${photos.length > 1 ? `<div style="margin-top:20px"><div style="font-weight:700;margin-bottom:12px">Photos (${photos.length})</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px">${photos.map(function(ph){return `<img src="${ph}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;cursor:pointer" onclick="viewPhotoFull('${ph}')" onerror="this.style.display='none'">`;}).join('')}</div></div>` : ''}
      <div style="display:flex;gap:12px;margin-top:24px">
        <button class="btn btn-primary" onclick="swipeLike();this.closest('div[style*=fixed]').remove()">❤️ Like</button>
        <button class="btn btn-outline" onclick="this.closest('div[style*=fixed]').remove()">Skip</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
};

window.swipeLike = async () => {
  if (!currentProfile) return;
  try {
    await addDoc(collection(db, 'likes'), {
      fromUserId: currentUser.id,
      toUserId: currentProfile.id,
      createdAt: new Date().toISOString(),
    });
    toast('❤️ Liked!');
  } catch(e) {}
  profileIndex++;
  showCard();
};

window.swipePass = () => { profileIndex++; showCard(); };
window.swipeSuperLike = async () => {
  if (!currentProfile) return;
  toast('⭐ Super Like!');
  await window.swipeLike();
};

async function loadMessages() {
  const el = document.getElementById('messagesList');
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const q = query(collection(db, 'matches'), where('users', 'array-contains', currentUser.id));
    const snap = await getDocs(q);
    if (snap.empty) { el.innerHTML = '<p style="text-align:center;padding:40px;color:#888">No messages yet</p>'; return; }
    el.innerHTML = '<div class="chat-list"></div>';
    const list = el.querySelector('.chat-list');
    for (const d of snap.docs) {
      const data = d.data();
      const otherId = data.users.find(u => u !== currentUser.id);
      const otherSnap = await getDoc(doc(db, 'users', otherId));
      const other = otherSnap.data();
      list.innerHTML += `
        <div class="chat-item" onclick="openChat('${d.id}','${otherId}')">
          <img class="avatar" src="${other?.photos?.[0] ?? 'https://via.placeholder.com/50'}" onerror="this.src='https://via.placeholder.com/50'">
          <div class="chat-info">
            <div class="chat-name">${other?.name ?? 'User'}</div>
            <div class="chat-last">${data.lastMessage ?? 'Say hello! 👋'}</div>
          </div>
        </div>`;
    }
  } catch(e) { el.innerHTML = '<p style="text-align:center;padding:40px;color:#888">Error loading messages</p>'; }
}

async function loadLikes() {
  const el = document.getElementById('likesList');
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const q = query(collection(db, 'likes'), where('toUserId', '==', currentUser.id));
    const snap = await getDocs(q);
    if (snap.empty) { el.innerHTML = '<p style="text-align:center;padding:40px;color:#888">No likes yet</p>'; return; }
    el.innerHTML = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px"></div>';
    const grid = el.querySelector('div');
    for (const d of snap.docs) {
      const data = d.data();
      const userSnap = await getDoc(doc(db, 'users', data.fromUserId));
      const user = userSnap.data();
      grid.innerHTML += `
        <div style="border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1)">
          <img src="${user?.photos?.[0] ?? 'https://via.placeholder.com/200'}" style="width:100%;height:150px;object-fit:cover">
          <div style="padding:8px;font-weight:600;font-size:14px">${user?.name ?? 'User'}</div>
        </div>`;
    }
  } catch(e) { el.innerHTML = '<p style="text-align:center;padding:40px;color:#888">Error loading likes</p>'; }
}

async function loadProfile() {
  const el = document.getElementById('profileContent');
  if (!currentUser) return;
  const u = currentUser;
  const photos = u.photos ?? [];
  el.innerHTML = `
    <div style="position:relative">
      <img src="${photos[0] ?? 'https://placehold.co/480x300/FF4B6E/white?text=No+Photo'}" style="width:100%;height:300px;object-fit:cover">
      <div style="position:absolute;bottom:-50px;left:20px">
        <img src="${photos[0] ?? 'https://placehold.co/100/FF4B6E/white?text=?'}" style="width:100px;height:100px;border-radius:50%;border:4px solid #fff;object-fit:cover">
      </div>
    </div>
    <div style="padding:60px 20px 20px">
      <div style="font-size:24px;font-weight:800">${u.name ?? 'User'}${u.age ? ', ' + u.age : ''}</div>
      <div style="color:#888;font-size:14px;margin-top:2px">📍 ${u.location ?? 'Location not set'}</div>
      ${u.bio ? `<p style="margin-top:12px;color:#555;font-size:15px;line-height:1.5">${u.bio}</p>` : ''}
      ${u.interests?.length ? `<div style="margin-top:16px"><div style="font-weight:700;margin-bottom:8px">Interests</div><div style="display:flex;flex-wrap:wrap;gap:8px">${u.interests.map(i => `<span style="background:#fff0f3;color:#FF4B6E;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600">${i}</span>`).join('')}</div></div>` : ''}
      <div style="margin-top:16px;background:#f8f8f8;border-radius:16px;padding:16px">
        <div style="font-weight:700;margin-bottom:12px">About Me</div>
        ${[['Gender', u.gender],['Age', u.age ? u.age + ' years' : null],['Height', u.height ? u.height + ' cm' : null],['Education', u.education],['Location', u.location],['Looking for', u.lookingFor],['Smoking', u.smoking],['Children', u.children]].filter(function(p){return p[1];}).map(function(p){return `<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee"><span style="color:#888">${p[0]}</span><span style="font-weight:600">${p[1]}</span></div>`;}).join('')}
      </div>
      ${photos.length > 1 ? `<div style="margin-top:20px"><div style="font-weight:700;margin-bottom:12px">Photos (${photos.length})</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px">${photos.map(function(p,idx){return `<img src="${p}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;cursor:pointer" onerror="this.style.display='none'" onclick="viewPhotoFull('${p}')">`;}).join('')}</div></div>` : ''}
      <button class="btn btn-primary" style="margin-top:24px" onclick="openEditProfile()">Edit Profile</button>
      <button class="btn btn-outline" style="margin-top:8px" onclick="logout()">Log Out</button>
    </div>`;
}

window.viewPhotoFull = function(src) {
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:#000;z-index:9999;display:flex;align-items:center;justify-content:center';
  modal.innerHTML = `<span style="position:absolute;top:20px;right:20px;color:#fff;font-size:32px;cursor:pointer;z-index:1" onclick="this.parentElement.remove()">\u2715</span><img src="${src}" style="max-width:100%;max-height:100%;object-fit:contain">`;
  modal.onclick = function(e){ if(e.target===modal) modal.remove(); };
  document.body.appendChild(modal);
};

function selField(id, label, val, options) {
  return `<label style="font-size:13px;color:#888;font-weight:600;display:block;margin-top:14px">${label}</label>
    <select class="input" id="${id}" style="margin-top:6px">
      <option value="">Select</option>
      ${options.map(function(o){return `<option value="${o}" ${val===o?'selected':''}>${o}</option>`;}).join('')}
    </select>`;
}
function txtField(id, label, val, type) {
  return `<label style="font-size:13px;color:#888;font-weight:600;display:block;margin-top:14px">${label}</label>
    <input class="input" id="${id}" type="${type||'text'}" value="${val||''}" style="margin-top:6px">`;
}

window.openEditProfile = function() {
  const u = currentUser;
  const modal = document.createElement('div');
  modal.id = 'editModal';
  modal.style.cssText = 'position:fixed;inset:0;background:#fff;z-index:999;overflow-y:auto;max-width:480px;margin:0 auto';
  modal.innerHTML = `
    <div style="position:sticky;top:0;background:#fff;padding:16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #eee;z-index:1">
      <span onclick="document.getElementById('editModal').remove()" style="font-size:28px;cursor:pointer">‹</span>
      <span style="font-size:18px;font-weight:700">Edit Profile</span>
    </div>
    <div style="padding:20px 20px 40px">
      ${txtField('editName','Name',u.name)}
      ${selField('editGender','Gender',u.gender,['Male','Female'])}
      ${txtField('editDob','Birthday (YYYY-MM-DD)',u.dob,'text')}
      ${txtField('editLocation','Location',u.location)}
      <label style="font-size:13px;color:#888;font-weight:600;display:block;margin-top:14px">About me</label>
      <textarea class="input" id="editBio" rows="3" style="margin-top:6px;resize:vertical">${u.bio||''}</textarea>
      ${selField('editPurpose','Purpose',u.purpose,['Relationship','Friendship','Casual','Marriage'])}
      ${txtField('editHeight','Height (cm)',u.height,'number')}
      ${txtField('editWeight','Weight (kg)',u.weight,'number')}
      ${txtField('editEducation','Education',u.education)}
      ${selField('editSmoking','Smoking',u.smoking,['Never','Occasionally','Regularly'])}
      ${selField('editAlcohol','Alcohol',u.alcohol,['Never','Occasionally','Regularly'])}
      ${selField('editChildren','Children',u.children,['No children','Have children','Want children','Do not want'])}
      ${selField('editPhysique','Physique',u.physique,['Slim','Athletic','Average','Curvy','Plus size'])}
      ${selField('editDwelling','Dwelling',u.dwelling,['Apartment','House','With parents','Other'])}
      ${selField('editCar','Car',u.car,['No car','Have a car'])}
      ${selField('editSociability','Sociability',u.sociability,['Introvert','Extrovert','Ambivert'])}
      ${selField('editLookingFor','Looking for',u.lookingFor,['Man','Woman','Both','Everyone'])}
      ${txtField('editInterests','Interests (comma separated)',(u.interests||[]).join(', '))}
      <button class="btn btn-primary" style="margin-top:24px" onclick="saveProfile()">Save Changes</button>
    </div>`;
  document.body.appendChild(modal);
};
window.saveProfile = async function() {
  try {
    const g = function(id){ return document.getElementById(id).value; };
    const updates = {
      name: g('editName'),
      gender: g('editGender'),
      dob: g('editDob'),
      location: g('editLocation'),
      bio: g('editBio'),
      purpose: g('editPurpose'),
      height: parseInt(g('editHeight')) || null,
      weight: parseInt(g('editWeight')) || null,
      education: g('editEducation'),
      smoking: g('editSmoking'),
      alcohol: g('editAlcohol'),
      children: g('editChildren'),
      physique: g('editPhysique'),
      dwelling: g('editDwelling'),
      car: g('editCar'),
      sociability: g('editSociability'),
      lookingFor: g('editLookingFor'),
      interests: g('editInterests').split(',').map(function(s){return s.trim();}).filter(Boolean),
    };
    await updateDoc(doc(db, 'users', currentUser.id), updates);
    Object.assign(currentUser, updates);
    document.getElementById('editModal').remove();
    loadProfile();
    toast('Profile updated!');
  } catch(e) { toast('Error: ' + e.message); }
};

window.openChat = (matchId, otherId) => {
  toast('Chat coming soon!');
};

window.searchUsers = async () => {
  const term = document.getElementById('searchInput').value.trim();
  const el = document.getElementById('searchResults');
  if (!term) { el.innerHTML = ''; return; }
  try {
    const snap = await getDocs(collection(db, 'users'));
    const results = snap.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .filter(u => u.id !== currentUser?.id && u.name?.toLowerCase().includes(term.toLowerCase()));
    if (!results.length) { el.innerHTML = '<p style="text-align:center;padding:40px;color:#888">No users found</p>'; return; }
    el.innerHTML = results.map(u => `
      <div class="chat-item">
        <img class="avatar" src="${u.photos?.[0] ?? 'https://via.placeholder.com/50'}" onerror="this.src='https://via.placeholder.com/50'">
        <div class="chat-info">
          <div class="chat-name">${u.name}</div>
          <div class="chat-last">${u.location ?? ''}</div>
        </div>
      </div>`).join('');
  } catch(e) {}
};

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
